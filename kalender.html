<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender | 102e FOS De Albatros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<script>window.ACTIVE_PAGE='kalender'; window.ACTIVE_TOPBAR='kalender';</script>
<script src="js/components.js"></script>
</head>
<body>

<!-- Edit bar: enkel voor eenheidsleiding -->
<div class="edit-bar" data-permission="canManageEvents">
  <span><i class="ti ti-shield-check"></i> Eenheidsleiding</span>
  <button class="edit-bar-btn" onclick="openEventModal()">
    <i class="ti ti-calendar-plus"></i> Evenement toevoegen
  </button>
</div>

<div class="page-header">
  <div class="section-label">Planning</div>
  <h1>Kalender</h1>
  <p>Alle activiteiten en evenementen van De Albatros op een rij.</p>
</div>

<div class="section">
  <!-- Filter knoppen -->
  <div class="foto-filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('alle', this)">Alle takken</button>
    <button class="filter-btn" onclick="setFilter('Bevers', this)">Bevers</button>
    <button class="filter-btn" onclick="setFilter('Welpen', this)">Welpen</button>
    <button class="filter-btn" onclick="setFilter('JVG\'s', this)">JVG's</button>
    <button class="filter-btn" onclick="setFilter('VG\'s', this)">VG's</button>
    <button class="filter-btn" onclick="setFilter('Seniors', this)">Seniors</button>
    <button class="filter-btn" onclick="setFilter('Stam', this)">Stam</button>
    <button class="filter-btn" onclick="setFilter('Kamp', this)">Kampen</button>
    <button class="filter-btn" onclick="setFilter('Alle takken', this)">Alle takken</button>
  </div>

  <!-- Evenementen lijst -->
  <div id="kalenderLijst">
    <div class="kal-loading">
      <i class="ti ti-loader-2 spin"></i> Evenementen laden…
    </div>
  </div>
</div>

<!-- ── Event Modal (toevoegen / bewerken) ── -->
<div id="eventModal" class="modal" onclick="if(event.target===this)closeEventModal()">
  <div class="modal-content event-modal-box">
    <button class="close-btn" onclick="closeEventModal()"><i class="ti ti-x"></i></button>
    <h2 id="eventModalTitle">Evenement toevoegen</h2>

    <div class="login-field">
      <label>Titel</label>
      <input type="text" id="evTitel" placeholder="bv. Weekendactiviteit Bevers">
    </div>
    <div class="login-field">
      <label>Beschrijving</label>
      <input type="text" id="evBeschrijving" placeholder="bv. Boudewijn Seapark uitstap">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="login-field">
        <label>Datum</label>
        <input type="date" id="evDatum">
      </div>
      <div class="login-field">
        <label>Tak</label>
        <select id="evTak" class="ev-select">
          <option>Alle takken</option>
          <option>Bevers</option>
          <option>Welpen</option>
          <option>JVG's</option>
          <option>VG's</option>
          <option>Seniors</option>
          <option>Stam</option>
          <option>Kamp</option>
        </select>
      </div>
    </div>

    <div id="eventModalError" class="login-error"></div>

    <div style="display:flex;gap:.6rem;margin-top:.4rem">
      <button id="eventSaveBtn" class="btn-login-submit" onclick="saveEvent()" style="flex:1">
        <i class="ti ti-check"></i> Opslaan
      </button>
      <button id="eventDeleteBtn" class="btn-delete" onclick="deleteEvent()" style="display:none">
        <i class="ti ti-trash"></i> Verwijderen
      </button>
    </div>
  </div>
</div>

<style>
/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin .8s linear infinite; }

.kal-loading {
  font-size: .85rem;
  color: var(--text-muted);
  padding: 2rem 0;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.kal-empty {
  font-size: .85rem;
  color: var(--text-muted);
  padding: 2rem 0;
}

/* Maandlabel */
.kal-maand-label {
  font-size: .82rem;
  font-weight: 900;
  color: var(--blue);
  margin: 1.2rem 0 .5rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.kal-maand-label:first-child { margin-top: 0; }

/* Evenement kaart */
.kalender-card {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: .85rem 1rem;
  margin-bottom: .5rem;
  transition: box-shadow .15s;
}
.kalender-card:hover { box-shadow: 0 4px 16px rgba(26,82,118,.08); }

/* Edit knop op kaart (alleen zichtbaar als ingelogd met rechten) */
.kal-edit-btn {
  display: none;
  margin-left: auto;
  background: var(--cream);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: .72rem;
  font-weight: 700;
  color: var(--blue-light);
  cursor: pointer;
  align-items: center;
  gap: .3rem;
  flex-shrink: 0;
  transition: background .15s;
}
.kal-edit-btn:hover { background: var(--blue-pale); }
.logged-in [data-permission="canManageEvents"] ~ #kalenderLijst .kal-edit-btn,
body.logged-in .kal-edit-btn { display: flex; }

/* Event modal */
.event-modal-box {
  background: #fff;
  border-radius: 20px;
  width: min(92%, 460px);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  position: relative;
  box-shadow: 0 24px 60px rgba(0,0,0,.25);
  animation: modalSlideIn .2s ease;
}
.event-modal-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  color: var(--blue-dark);
  margin-bottom: -.2rem;
}
.ev-select {
  padding: .75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: .9rem;
  outline: none;
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: border-color .15s;
  width: 100%;
}
.ev-select:focus { border-color: var(--blue-light); }

.btn-delete {
  background: #FFF0F0;
  border: 1.5px solid #F5C6C6;
  color: #C0392B;
  border-radius: 10px;
  padding: .75rem 1.2rem;
  font-family: 'Nunito', sans-serif;
  font-size: .88rem;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: .4rem;
  transition: background .15s;
}
.btn-delete:hover { background: #FFE0E0; }
</style>

<script>
// ── State ────────────────────────────────────────────────────
let alleEvenementen = [];
let huidigFilter    = 'alle';
let bewerkId        = null;   // null = nieuw, uuid = bewerken

const MAANDEN = ['Januari','Februari','Maart','April','Mei','Juni',
                 'Juli','Augustus','September','Oktober','November','December'];

// ── Supabase client ophalen (wacht tot AlbatrosAuth klaar is) ─
function getClient() {
  return window.AlbatrosAuth?.supabase || null;
}

async function waitForClient(maxMs = 5000) {
  const start = Date.now();
  while (!getClient()) {
    if (Date.now() - start > maxMs) throw new Error('Supabase client niet beschikbaar.');
    await new Promise(r => setTimeout(r, 100));
  }
  return getClient();
}

// ── Data laden ───────────────────────────────────────────────
async function laadEvenementen() {
  const lijst = document.getElementById('kalenderLijst');
  lijst.innerHTML = '<div class="kal-loading"><i class="ti ti-loader-2 spin"></i> Evenementen laden…</div>';

  let sb;
  try {
    sb = await waitForClient();
  } catch (e) {
    lijst.innerHTML = '<div class="kal-empty">Kon geen verbinding maken. Herlaad de pagina.</div>';
    return;
  }

  const { data, error } = await sb
    .from('evenementen')
    .select('*')
    .order('datum', { ascending: true });

  if (error) {
    console.error('[Kalender] Laden mislukt:', error);
    lijst.innerHTML = '<div class="kal-empty">Evenementen konden niet geladen worden.</div>';
    return;
  }

  alleEvenementen = data || [];
  toonEvenementen();
}

// ── Renderen ─────────────────────────────────────────────────
function toonEvenementen() {
  const lijst = document.getElementById('kalenderLijst');
  const nu    = new Date();

  const gefilterd = huidigFilter === 'alle'
    ? alleEvenementen
    : alleEvenementen.filter(e => e.tak === huidigFilter);

  // Splits op in toekomstig vs verleden
  const komend  = gefilterd.filter(e => new Date(e.datum) >= new Date(nu.toDateString()));
  const verleden = gefilterd.filter(e => new Date(e.datum) <  new Date(nu.toDateString()));

  if (gefilterd.length === 0) {
    lijst.innerHTML = '<div class="kal-empty">Geen evenementen gevonden.</div>';
    return;
  }

  let html = '';

  if (komend.length > 0) {
    html += renderGroep(komend);
  }

  if (verleden.length > 0) {
    html += `<div class="kal-maand-label" style="margin-top:1.5rem;color:var(--text-muted)">Voorbij</div>`;
    html += renderGroep([...verleden].reverse(), true);
  }

  lijst.innerHTML = html;
}

function renderGroep(events, gedempt = false) {
  let huidigeMaand = null;
  let html = '';

  events.forEach(ev => {
    const d     = new Date(ev.datum + 'T00:00:00'); // lokale tijd
    const maand = `${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;

    if (maand !== huidigeMaand) {
      html += `<div class="kal-maand-label">${maand}</div>`;
      huidigeMaand = maand;
    }

    const dag = String(d.getDate()).padStart(2, '0');
    const mnd = MAANDEN[d.getMonth()].slice(0, 3);
    const opacity = gedempt ? 'opacity:.5' : '';

    html += `
      <div class="kalender-card" style="${opacity}">
        <div class="kal-date">
          <span class="day">${dag}</span>
          <span class="mon">${mnd}</span>
        </div>
        <div class="kal-info">
          <h3>${escHtml(ev.titel)}</h3>
          ${ev.beschrijving ? `<p>${escHtml(ev.beschrijving)}</p>` : ''}
        </div>
        <div class="kal-tag">${escHtml(ev.tak)}</div>
        <button class="kal-edit-btn" onclick="openEventModal('${ev.id}')">
          <i class="ti ti-pencil"></i> Bewerken
        </button>
      </div>`;
  });

  return html;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Filter ───────────────────────────────────────────────────
function setFilter(tak, btn) {
  huidigFilter = tak;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  toonEvenementen();
}

// ── Modal openen ─────────────────────────────────────────────
function openEventModal(id = null) {
  bewerkId = id;
  const modal    = document.getElementById('eventModal');
  const title    = document.getElementById('eventModalTitle');
  const deleteBtn = document.getElementById('eventDeleteBtn');
  const err      = document.getElementById('eventModalError');

  err.textContent = '';

  if (id) {
    // Bestaand evenement invullen
    const ev = alleEvenementen.find(e => e.id === id);
    if (!ev) return;
    title.textContent                        = 'Evenement bewerken';
    document.getElementById('evTitel').value        = ev.titel;
    document.getElementById('evBeschrijving').value = ev.beschrijving || '';
    document.getElementById('evDatum').value         = ev.datum;
    document.getElementById('evTak').value           = ev.tak;
    deleteBtn.style.display = 'flex';
  } else {
    // Leeg formulier voor nieuw evenement
    title.textContent                        = 'Evenement toevoegen';
    document.getElementById('evTitel').value        = '';
    document.getElementById('evBeschrijving').value = '';
    document.getElementById('evDatum').value         = '';
    document.getElementById('evTak').value           = 'Alle takken';
    deleteBtn.style.display = 'none';
  }

  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('evTitel')?.focus(), 50);
}

function closeEventModal() {
  document.getElementById('eventModal').style.display = 'none';
  bewerkId = null;
}

// ── Opslaan (nieuw of update) ────────────────────────────────
async function saveEvent() {
  const titel       = document.getElementById('evTitel').value.trim();
  const beschrijving = document.getElementById('evBeschrijving').value.trim();
  const datum       = document.getElementById('evDatum').value;
  const tak         = document.getElementById('evTak').value;
  const btn         = document.getElementById('eventSaveBtn');
  const err         = document.getElementById('eventModalError');

  err.textContent = '';

  if (!titel)  { err.textContent = 'Vul een titel in.'; return; }
  if (!datum)  { err.textContent = 'Kies een datum.'; return; }

  btn.disabled    = true;
  btn.textContent = 'Bezig…';

  try {
    const sb = getClient();
    if (!sb) throw new Error('Niet verbonden. Herlaad de pagina.');

    const payload = { titel, beschrijving: beschrijving || null, datum, tak };

    let error;
    if (bewerkId) {
      ({ error } = await sb.from('evenementen').update(payload).eq('id', bewerkId));
    } else {
      ({ error } = await sb.from('evenementen').insert(payload));
    }

    if (error) throw error;

    closeEventModal();
    await laadEvenementen();
  } catch (e) {
    err.textContent = e.message || 'Opslaan mislukt.';
  } finally {
    btn.disabled    = false;
    btn.innerHTML   = '<i class="ti ti-check"></i> Opslaan';
  }
}

// ── Verwijderen ──────────────────────────────────────────────
async function deleteEvent() {
  if (!bewerkId) return;
  const ev  = alleEvenementen.find(e => e.id === bewerkId);
  const naam = ev?.titel || 'dit evenement';

  if (!confirm(`"${naam}" verwijderen? Dit kan niet ongedaan gemaakt worden.`)) return;

  const btn = document.getElementById('eventDeleteBtn');
  btn.disabled = true;

  try {
    const sb = getClient();
    if (!sb) throw new Error('Niet verbonden.');
    const { error } = await sb.from('evenementen').delete().eq('id', bewerkId);
    if (error) throw error;
    closeEventModal();
    await laadEvenementen();
  } catch (e) {
    document.getElementById('eventModalError').textContent = e.message || 'Verwijderen mislukt.';
    btn.disabled = false;
  }
}

// ── Keyboard shortcuts in modal ──────────────────────────────
document.addEventListener('keydown', (e) => {
  const modal = document.getElementById('eventModal');
  if (!modal || modal.style.display !== 'flex') return;
  if (e.key === 'Escape') closeEventModal();
});

// ── Start ────────────────────────────────────────────────────
// Wacht tot AlbatrosAuth zijn init gedaan heeft, dan laden
document.addEventListener('DOMContentLoaded', () => {
  // Kleine vertraging zodat auth.js ook klaar is
  setTimeout(laadEvenementen, 300);
});
</script>

</body>
</html>
