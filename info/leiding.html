<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leiding | 102e FOS De Albatros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="../css/style.css">
<script>window.ACTIVE_PAGE='info'; window.COMPONENTS_DEPTH=1;</script>
<script src="../js/components.js"></script>
<script src="../js/leiding-utils.js"></script>
</head>
<body>

<div class="edit-bar" data-permission="canManageEvents">
  <span><i class="ti ti-shield-check"></i> Eenheidsleiding</span>
  <button class="edit-bar-btn" onclick="LeidingUtils.openModal()">
    <i class="ti ti-user-plus"></i> Leidingslid toevoegen
  </button>
</div>

<div class="page-header">
  <div class="section-label">Info</div>
  <h1>Onze leiding</h1>
  <p>Maak kennis met de mensen die De Albatros draaiende houden.</p>
</div>

<div id="leidingOverzicht">
  <div class="section">
    <div class="leiding-loading"><i class="ti ti-loader-2 spin"></i> Leiding laden…</div>
  </div>
</div>

<script>
function laad() {
  LeidingUtils.laadVolledigOverzicht('leidingOverzicht');
}
window.addEventListener('leiding-updated', laad);
document.addEventListener('DOMContentLoaded', () => setTimeout(laad, 300));
</script>

</body>
</html>
